# cluster-api/workers.yaml
# BlueUPALM — Workers: MachineDeployment + GCPMachineTemplate
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: bc-workload-workers
  namespace: default
spec:
  replicas: 3
  clusterName: bc-workload
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: bc-workload
  template:
    spec:
      clusterName: bc-workload
      version: v1.29.0
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: KubeadmConfigTemplate
          name: bc-workload-workers
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: GCPMachineTemplate
        name: bc-workload-workers

---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: bc-workload-workers
  namespace: default
spec:
  template:
    spec:
      joinConfiguration:
        nodeRegistration:
          name: '{{ ds.meta_data.local_hostname }}'
          kubeletExtraArgs:
            cloud-provider: external
            node-labels: "role=worker,ceph-osd=true"

---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: GCPMachineTemplate
metadata:
  name: bc-workload-workers
  namespace: default
spec:
  template:
    spec:
      subnet: "blueupalm-subnet-${GCP_REGION}"
      image: "projects/${GCP_PROJECT_ID}/global/images/family/blueupalm-k8s-node"
      instanceType: "e2-standard-4"
      rootDeviceSize: 100
      rootDeviceType: "pd-ssd"

      additionalDisks:
        - deviceType: "pd-standard"
          size: 200

      serviceAccounts:
        email: "${NODES_SA_EMAIL}"
        scopes:
          - "https://www.googleapis.com/auth/cloud-platform"

      additionalLabels:
        role: worker
        project: blueupalm
        ceph-osd: "true"

      additionalNetworkTags:
        - "bc-workload-node"
