# cluster-api/cluster.yaml
# BlueUPALM — Workload Cluster: GCPCluster + Cluster (CAPI/CAPG)
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: bc-workload
  namespace: default
  labels:
    project: blueupalm
    environment: demo
    compliance: dora-pbc-ft
spec:
  clusterNetwork:
    pods:
      cidrBlocks: ["10.1.0.0/16"]
    services:
      cidrBlocks: ["10.2.0.0/20"]
  
  # Referencia al plano de control (Talos — CACPT)
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1alpha3
    kind: TalosControlPlane
    name: bc-workload-control-plane

  # Referencia a la infraestructura (GCP)
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: GCPCluster
    name: bc-workload

---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: GCPCluster
metadata:
  name: bc-workload
  namespace: default
spec:
  project: "${GCP_PROJECT_ID}"
  region: "${GCP_REGION}"

  # VPC creada por Terraform
  network:
    name: "blueupalm-vpc"
    subnets:
      - name: "blueupalm-subnet-${GCP_REGION}"
        region: "${GCP_REGION}"
        cidrBlock: "10.0.0.0/20"
        secondaryCidrBlocks:
          pods: "10.1.0.0/16"
          services: "10.2.0.0/20"

  # Load Balancer para el kube-apiserver del Control Plane
  loadBalancer:
    loadBalancerType: Internal    # Revertido a Internal para cumplimiento DORA/PBC-FT (Hardening)

  # Service Account para los nodos (creada por módulo IAM de Terraform)
  additionalLabels:
    project: blueupalm
    managed-by: cluster-api
