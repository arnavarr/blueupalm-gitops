# cluster-api/control-plane.yaml
# BlueUPALM — Control Plane: TalosControlPlane + GCPMachineTemplate
# Reemplaza: KubeadmControlPlane + KubeadmConfigTemplate
# Bootstrap: CACPT (Cluster API Control Plane Provider Talos) v0.5.6
# Arquitectura: docs/architecture/talos-sovereign-stack.md

apiVersion: controlplane.cluster.x-k8s.io/v1alpha3
kind: TalosControlPlane
metadata:
  name: bc-workload-control-plane
  namespace: default
spec:
  version: v1.29.6
  replicas: 1                          # HA producción bancaria: 3 réplicas
  infrastructureTemplate:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: GCPMachineTemplate
    name: bc-workload-control-plane
  controlPlaneConfig:
    controlplane:
      generateType: controlplane       # Talos genera PKI propio — sin kubeadm
      talosVersion: v1.7.6
      # Parches aplicados sobre el MachineConfig base
      configPatches:
        # Extensiones del sistema (gVisor + Kata) — se añaden post-bootstrap via upgrade
        # Requieren imagen Talos con extensiones pre-incluidas o upgrade del sistema
        # - op: add
        #   path: /machine/install/extensions
        #   value:
        #     - image: ghcr.io/siderolabs/gvisor:20240101.0
        #     - image: ghcr.io/siderolabs/kata-containers:3.4.0
        # Audit log para cumplimiento DORA — se configura post-bootstrap via MachineConfig
        # El path /var/log requiere extraVolumes correctos; se añade en fase 2
        # - op: add
        #   path: /cluster/apiServer/extraArgs
        #   value:
        #     audit-log-path: /var/log/kube-apiserver-audit.log
        #     audit-log-maxage: "30"
        #     audit-log-maxbackup: "3"
        #     audit-log-maxsize: "100"
        # CNI: ninguno — Cilium lo instala Flux
        # Usar add sobre /cluster/network para asegurar que cni.name=none aunque no exista el path
        - op: add
          path: /cluster/network/cni
          value:
            name: none

---
# GCPMachineTemplate — Infraestructura GCP (sin cambios respecto a arquitectura anterior)
# Solo se actualiza la imagen: Talos oficial en lugar de custom Ubuntu
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: GCPMachineTemplate
metadata:
  name: bc-workload-control-plane
  namespace: default
spec:
  template:
    spec:
      subnet: "blueupalm-subnet-${GCP_REGION}"
      # Imagen Talos Linux oficial para GCE (registrada en setup_all.sh paso 4)
      # Elimina la necesidad de bootstrap/03-build-gce-image.sh (Packer + Ubuntu custom)
      image: "projects/${GCP_PROJECT_ID}/global/images/${TALOS_IMAGE_NAME}"
      instanceType: "e2-standard-4"
      rootDeviceSize: 100
      rootDeviceType: "pd-ssd"
      serviceAccounts:
        email: "${NODES_SA_EMAIL}"
        scopes:
          - "https://www.googleapis.com/auth/cloud-platform"
      additionalLabels:
        role: control-plane
        project: blueupalm
        os: talos

