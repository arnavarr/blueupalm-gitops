# Namespace gestionado por infrastructure/namespaces.yaml (Flux Kustomization: namespaces)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zta-catalog-nginx
  namespace: catalog
  labels:
    app: zta-catalog-nginx
    app.kubernetes.io/part-of: ztaclient
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zta-catalog-nginx
  template:
    metadata:
      labels:
        app: zta-catalog-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: catalog-data
              mountPath: /usr/share/nginx/html/catalog.yaml
              subPath: catalog.yaml
            - name: catalog-data
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: catalog-data
          configMap:
            name: zta-catalog-data
---
apiVersion: v1
kind: Service
metadata:
  name: zta-catalog-nginx
  namespace: catalog
  labels:
    app: zta-catalog-nginx
spec:
  selector:
    app: zta-catalog-nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
