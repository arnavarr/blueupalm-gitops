# flux/clusters/bc-workload/applications/image-automation.yaml
# BlueUPALM — Flux Image Automation
#
# Detecta nuevas imágenes publicadas en GHCR por los workflows de ./bc
# y actualiza automáticamente los tags en los deployments de este repo.
#
# Flujo:
#   GitHub Actions (bc repo) push → ghcr.io/arnavarr/bc-* → ImagePolicy detecta
#   → ImageUpdateAutomation hace commit a blueupalm-gitops → Flux sync → K8s rollout
#
# ── POLÍTICA DE TAGS (2026-05-03) ──────────────────────────────────────────────
# Los workflows CI generan tags `sha-XXXXXXX` y `latest`.
# ImagePolicy usa patrón glob `sha-*` para detectar nuevas imágenes.
# Cuando se migre a semver en CI, cambiar a policy.semver.range ">=0.1.0"

---
# ── ImageRepository: edge-security ────────────────────────────────────────────
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: bc-edge-security
  namespace: flux-system
spec:
  image: ghcr.io/arnavarr/bc-edge-security
  interval: 5m
  secretRef:
    name: ghcr-auth

---
# ── ImagePolicy: edge-security (sha-* glob) ────────────────────────────────────
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: bc-edge-security
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: bc-edge-security
  policy:
    alphabetical:
      order: asc    # sha-XXXXXXX → ordena alfabéticamente, más reciente al final
  filterTags:
    pattern: '^sha-[a-f0-9]+'

---
# ── ImageRepository: ingestion-agent ─────────────────────────────────────────
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: bc-ingestion-agent
  namespace: flux-system
spec:
