# flux/clusters/bc-workload/applications/ingestion-agent/externalsecrets.yaml
# BlueUPALM — ExternalSecrets para ingestion-agent
#
# Sincroniza desde GCP Secret Manager via External Secrets Operator:
#   - nats-nkey-seed-ingestor : seed NKey Ed25519 para autenticación NATS

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nats-nkey-seed-ingestor
  namespace: applications
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: nats-nkey-seed-ingestor
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        seed: "{{ .nkey_seed }}"
  data:
    - secretKey: nkey_seed
      remoteRef:
        key: blueupalm/nats-nkey-seed-ingestor
        version: latest
