# flux/clusters/bc-workload/applications/edge-security/externalsecrets.yaml
# BlueUPALM — ExternalSecrets para edge-security
#
# Sincroniza desde GCP Secret Manager via External Secrets Operator:
#   - biscuit-root-key-pkcs8 : clave privada Ed25519 para firma de tokens Biscuit
#   - nats-nkey-seed-edge    : seed NKey Ed25519 para autenticación NATS

---
# ── Secreto: Biscuit Root Key ─────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: biscuit-root-key
  namespace: applications
  annotations:
    # Política de rotación: cada 90 días, 7 días de grace period
    rotation.policy: "90d"
    rotation.grace-period: "7d"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager          # ClusterSecretStore en infrastructure/external-secrets/
    kind: ClusterSecretStore
  target:
    name: biscuit-root-key            # Nombre del Secret K8s resultante
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        key.pkcs8: "{{ .biscuit_root_key | b64dec }}"
  data:
    - secretKey: biscuit_root_key
      remoteRef:
        key: blueupalm/biscuit-root-key-pkcs8
        version: latest

---
# ── Secreto: NATS NKey seed (edge-security) ───────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nats-nkey-seed-edge
  namespace: applications
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: nats-nkey-seed-edge
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        seed: "{{ .nkey_seed }}"
  data:
    - secretKey: nkey_seed
      remoteRef:
        key: blueupalm/nats-nkey-seed-edge
        version: latest
