---
# flux/clusters/bc-workload/applications/catalog.yaml
# Flux Kustomization que despliega el Dark Service catalog.bc.internal
# Namespace: catalog
# Fuente: gitops/apps/catalog/ (en este mismo repo)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: zta-catalog
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./gitops/apps/catalog
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: catalog
  timeout: 2m0s
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: zta-catalog-nginx
      namespace: catalog
