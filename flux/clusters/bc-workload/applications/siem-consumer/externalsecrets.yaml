---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nats-nkey-seed-siem
  namespace: applications
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: nats-nkey-seed-siem
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        seed: "{{ .nkey_seed }}"
  data:
    - secretKey: nkey_seed
      remoteRef:
        key: blueupalm/nats-nkey-seed-ingestor
        version: latest
