# flux/clusters/bc-workload/applications/seed-job/job.yaml
# BlueUPALM — Seed Job (migraciones Alembic + datos demo)
#
# Se ejecuta ONCE en el primer deploy. Idempotente gracias a Alembic.
# Referencia original: bc/scripts/seed/k8s-seed-job.yaml (namespace blueupalm)
# Adaptado para namespace 'applications' y FluxCD Kustomization.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: blueupalm-seed
  namespace: applications
  labels:
    app.kubernetes.io/name: blueupalm-seed
    app.kubernetes.io/component: seed-job
    app.kubernetes.io/managed-by: flux
  annotations:
    # Solo ejecutar en creación inicial — no en cada reconciliación
    kustomize.toolkit.fluxcd.io/reconcile: disabled
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blueupalm-seed
    spec:
      restartPolicy: OnFailure
      serviceAccountName: bc-api   # Reutiliza la SA de la API

      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgresql.data.svc.cluster.local 5432; do
                echo "Waiting for PostgreSQL..."; sleep 3;
              done; echo "PostgreSQL ready."

      containers:
        - name: seed
          image: ghcr.io/arnavarr/bc-api:latest
          command:
            - sh
            - -c
            - |
              echo "=== Alembic: upgrade head ===" && \
              alembic upgrade head && \
              echo "=== Seed: datos demo ===" && \
              python scripts/seed_data.py && \
              echo "=== Seed completado ==="
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-api-credentials
                  key: url
            - name: SEED_MODE
              value: "demo"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
