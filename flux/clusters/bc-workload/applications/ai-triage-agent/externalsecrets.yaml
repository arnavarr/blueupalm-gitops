---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nats-nkey-seed-ai-triage
  namespace: applications
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: nats-nkey-seed-ai-triage
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        seed: "{{ .nkey_seed }}"
  data:
    - secretKey: nkey_seed
      remoteRef:
        key: blueupalm/nats-nkey-seed-ai-triage
        version: latest

---
# Gemini API Key — desde GCP Secret Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gemini-api-key
  namespace: applications
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: gemini-api-key
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        key: "{{ .gemini_key }}"
  data:
    - secretKey: gemini_key
      remoteRef:
        key: blueupalm-gemini-api-key
        version: latest
