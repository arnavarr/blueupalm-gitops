# flux/clusters/bc-workload/applications/api/externalsecrets.yaml
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-api-credentials
  namespace: applications
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: postgres-api-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        url: "postgresql+asyncpg://blueupalm:{{ .pg_password }}@postgresql.data.svc.cluster.local:5432/blueupalm"
  data:
    - secretKey: pg_password
      remoteRef:
        key: blueupalm/postgres-password
        version: latest

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nats-nkey-seed-api
  namespace: applications
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: nats-nkey-seed-api
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        seed: "{{ .nkey_seed }}"
  data:
    - secretKey: nkey_seed
      remoteRef:
        key: blueupalm/nats-nkey-seed-admin
        version: latest

---
# Credenciales NetFoundry — desde GCP Secret Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: netfoundry-credentials
  namespace: applications
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: netfoundry-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        client_id: "{{ .nf_client_id }}"
        client_secret: "{{ .nf_client_secret }}"
  data:
    - secretKey: nf_client_id
      remoteRef:
        key: blueupalm-nf-client-id
        version: latest
    - secretKey: nf_client_secret
      remoteRef:
        key: blueupalm-nf-client-secret
        version: latest

---
# Fernet key para cifrado JWT de provisioning — desde GCP Secret Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: provisioning-encryption-key
  namespace: applications
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: provisioning-encryption-key
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        key: "{{ .fernet_key }}"
  data:
    - secretKey: fernet_key
      remoteRef:
        key: blueupalm-provisioning-jwt-key
        version: latest
