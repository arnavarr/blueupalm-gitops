# flux/clusters/bc-workload/networking/traefik/helmrelease.yaml
# BlueUPALM — Traefik Ingress Controller
#
# Punto de entrada ÚNICO para tráfico externo.
# Rutas expuestas (sobre navarro-bores.com):
#   blueupalm.navarro-bores.com/         → frontend React
#   blueupalm.navarro-bores.com/api/edge/ → edge-security (solo /issue y /health)
#   auth.navarro-bores.com/              → Keycloak
#   hubble.navarro-bores.com/            → Hubble UI (Cilium observabilidad)
#   grafana.navarro-bores.com/           → Grafana
#
# NUNCA expuesto: NATS :8222, OPA :8181, SPIRE, Trino, PostgreSQL, /verify endpoint

---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: traefik
  namespace: networking
spec:
  interval: 24h
  url: https://traefik.github.io/charts

---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: traefik
  namespace: networking
spec:
  interval: 10m
  chart:
    spec:
      chart: traefik
      version: "27.*"    # Traefik v3.x
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: networking

  values:
    # Usar la IP estática reservada por Terraform
    service:
      type: LoadBalancer
      annotations:
        networking.gke.io/load-balancer-ip-source-ranges: "0.0.0.0/0"

    # TLS: usar el certificado wildcard emitido por cert-manager
    ports:
      web:
        redirectTo:
          port: websecure   # Forzar HTTPS
      websecure:
        tls:
          enabled: true
          options: "default"

    # Acceso al dashboard solo desde dentro del cluster
    ingressRoute:
      dashboard:
        enabled: false

    # Prometheus metrics
    metrics:
      prometheus:
        entryPoint: metrics
        addServicesLabels: true
        addEntryPointsLabels: true
        serviceMonitor:
          enabled: true
          namespace: observability

    # Pod Security
    podSecurityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault

    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop: ["ALL"]
        add: ["NET_BIND_SERVICE"]

---
# ── TLSOption: configuración TLS estricta ─────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: TLSOption
metadata:
  name: default
  namespace: networking
spec:
  minVersion: VersionTLS12
  cipherSuites:
    - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
    - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
    - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305

---
# ── Middleware: Rate Limiting en /api/edge/issue ──────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit-edge-issue
  namespace: networking
spec:
  rateLimit:
    average: 100      # max 100 req/min por IP
    period: 1m
    burst: 20

---
# ── Middleware: Security Headers (HSTS, CSP, etc.) ───────────────────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: networking
spec:
  headers:
    stsSeconds: 31536000        # HSTS 1 año
    stsIncludeSubdomains: true
    stsPreload: true
    forceSTSHeader: true
    frameDeny: true             # X-Frame-Options: DENY
    contentTypeNosniff: true    # X-Content-Type-Options: nosniff
    browserXssFilter: true
    referrerPolicy: "strict-origin-when-cross-origin"
    contentSecurityPolicy: >-
      default-src 'self';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data:;
      connect-src 'self' https://blueupalm.navarro-bores.com;
    customResponseHeaders:
      X-Powered-By: ""          # Ocultar información del servidor
      Server: ""

---
# ── Middleware: Strip prefix /api/edge ───────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-edge-prefix
  namespace: networking
spec:
  stripPrefix:
    prefixes:
      - "/api/edge"

---
# ── IngressRoute: Frontend React ──────────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: frontend
  namespace: networking
spec:
  entryPoints:
    - websecure
  tls:
    secretName: blueupalm-tls-wildcard
  routes:
    - match: Host(`blueupalm.navarro-bores.com`) && PathPrefix(`/`)
      kind: Rule
      middlewares:
        - name: security-headers
      services:
        - name: frontend
          namespace: applications
          port: 80

---
# ── IngressRoute: edge-security (SOLO /issue y /health) ──────────────────────
# CRÍTICO: /verify NUNCA se expone. Opera exclusivamente por NATS.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: edge-security-api
  namespace: networking
spec:
  entryPoints:
    - websecure
  tls:
    secretName: blueupalm-tls-wildcard
  routes:
    # /issue — emisión de tokens Biscuit (rate limited)
    - match: Host(`blueupalm.navarro-bores.com`) && PathPrefix(`/api/edge/issue`)
      kind: Rule
      middlewares:
        - name: strip-edge-prefix
        - name: rate-limit-edge-issue
        - name: security-headers
      services:
        - name: edge-security
          namespace: applications
          port: 8080

    # /health — health check sin rate limiting
    - match: Host(`blueupalm.navarro-bores.com`) && PathPrefix(`/api/edge/health`)
      kind: Rule
      middlewares:
        - name: strip-edge-prefix
        - name: security-headers
      services:
        - name: edge-security
          namespace: applications
          port: 8080

    # BLOQUEO EXPLÍCITO de /verify — 404 inmediato
    - match: Host(`blueupalm.navarro-bores.com`) && PathPrefix(`/api/edge/verify`)
      kind: Rule
      services:
        - name: noop-404@internal
          kind: TraefikService

---
# ── IngressRoute: Keycloak ────────────────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: keycloak
  namespace: networking
spec:
  entryPoints:
    - websecure
  tls:
    secretName: blueupalm-tls-wildcard
  routes:
    - match: Host(`auth.navarro-bores.com`)
      kind: Rule
      middlewares:
        - name: security-headers
      services:
        - name: keycloak
          namespace: security
          port: 80

---
# ── IngressRoute: Hubble UI ───────────────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hubble-ui
  namespace: networking
spec:
  entryPoints:
    - websecure
  tls:
    secretName: blueupalm-tls-wildcard
  routes:
    - match: Host(`hubble.navarro-bores.com`)
      kind: Rule
      middlewares:
        - name: security-headers
      services:
        - name: hubble-ui
          namespace: cilium-system
          port: 80

---
# ── IngressRoute: Grafana ─────────────────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: networking
spec:
  entryPoints:
    - websecure
  tls:
    secretName: blueupalm-tls-wildcard
  routes:
    - match: Host(`grafana.navarro-bores.com`)
      kind: Rule
      middlewares:
        - name: security-headers
      services:
        - name: kube-prometheus-stack-grafana
          namespace: observability
          port: 80
