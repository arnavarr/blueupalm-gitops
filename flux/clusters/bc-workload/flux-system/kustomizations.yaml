# flux/clusters/bc-workload/flux-system/kustomizations.yaml
# BlueUPALM — Orden de sincronización Flux CD
#
# Cada Kustomization define una capa del stack CNCF con dependencias explícitas.
# Flux aplica en el orden definido por dependsOn, garantizando que:
#   - Cilium CNI esté activo antes de desplegar pods
#   - External Secrets esté listo antes de Keycloak/SPIRE (necesitan secretos)
#   - NATS esté operativo antes de edge-security e ingestion-agent
#
# Motor GitOps: Flux sincroniza desde github.com/arnavarr/blueupalm-gitops

---
# ── 1. Namespaces (sin dependencias) ──────────────────────────────────────────
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: namespaces
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./flux/clusters/bc-workload/infrastructure
  prune: true
  wait: true
  timeout: 2m

---
# ── 2. Infrastructure (CNI, CSI, cert-manager, External Secrets) ───────────────
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: namespaces
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./flux/clusters/bc-workload/infrastructure
  prune: true
  wait: true
  timeout: 20m    # Cilium + cert-manager pueden tardar en iniciar

---
# ── 2.5. Cloud Controller Manager (GCP CCM) ───────────────────────────────────
# DEBE ir antes de security/networking para que los workers sean inicializados
# (se elimina el taint node.cloudprovider.kubernetes.io/uninitialized)
# antes de que Keycloak y SPIRE intenten schedulear sus pods.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloud-controller-manager
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: infrastructure    # Cilium debe estar activo primero
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./flux/clusters/bc-workload/infrastructure/cloud-controller-manager
  prune: true
  wait: true
  timeout: 5m

---
# ── 3. Security (Keycloak, SPIRE, OPA, OpenZiti, Dex) ─────────────────────────
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: security
  namespace: flux-system
spec:
  interval: 10m
  # retryInterval: reintenta la sincronización en caso de error transitorio (PVC pendiente, pod crashloop)
  retryInterval: 2m
  dependsOn:
    - name: infrastructure
    - name: cloud-controller-manager   # Workers deben estar inicializados antes de schedulear pods
    - name: data                        # Keycloak necesita PostgreSQL (data layer) operativo
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./flux/clusters/bc-workload/security
  prune: true
  wait: true
  # 30m: SPIRE necesita cert-manager + ceph-block PVC + handshake SVID inicial en cada nodo.
  # Keycloak espera PostgreSQL (data layer) que tarda 5-10 min en el primer boot.
  timeout: 30m

---
# ── 4. Networking (Traefik Ingress + Middlewares) ─────────────────────────────
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: networking
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: infrastructure
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./flux/clusters/bc-workload/networking
  prune: true
  wait: true
  timeout: 10m

---
# ── 4.5. Networking Routes (IngressRoutes — requieren Traefik CRDs) ───────────
# Separado de networking para evitar dry-run failures antes de que Traefik instale sus CRDs.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: networking-routes
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: networking   # Traefik debe estar instalado (CRDs disponibles)
    - name: security     # Keycloak y otros backends deben existir
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./flux/clusters/bc-workload/networking/routes
  prune: true
  wait: false    # No bloquear otras kustomizations si los backends no están ready
  timeout: 5m

---
# ── 5. Messaging (NATS JetStream cluster 3 réplicas) ─────────────────────────────
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: messaging
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: infrastructure
    # NATS usa NKeys (no SPIRE SVIDs) — no depende de security para arrancar.
    # La dependencia de security se restaura aquí solo para garantizar que
    # External Secrets haya propagado los seeds NKey antes de que NATS los lea.
    - name: security
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./flux/clusters/bc-workload/messaging
  prune: true
  wait: true
  timeout: 10m

---
# ── 6. Data (Rook-Ceph, PostgreSQL, Qdrant, Trino) ────────────────────────
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: data
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    # PostgreSQL y Qdrant no necesitan NATS para iniciar — solo necesitan CSI (Rook-Ceph PVCs).
    # Qdrant se conectará a NATS una vez que messaging esté ready (conexión lazy).
    # No se añade messaging como dependencia para evitar el ciclo:
    #   security → data → messaging → security
    - name: infrastructure
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./flux/clusters/bc-workload/data
  prune: true
  wait: false  # No bloquear si Rook-Ceph tarda (PVCs pendientes en primer boot)
  timeout: 30m    # Rook-Ceph inicialización es lenta (5-15 min)

---
# ── 7. Applications (edge-security, ingestion-agent, frontend) ────────────────
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: applications
  namespace: flux-system
spec:
  interval: 5m     # Polling más frecuente para Flux Image Automation
  dependsOn:
    - name: data
    - name: security
    - name: networking
    - name: messaging
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./flux/clusters/bc-workload/applications
  prune: true
  wait: true
  timeout: 10m

---
# ── 8. Observability (Prometheus, Grafana, Loki, Hubble) ─────────────────────
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: observability
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 3m
  dependsOn:
    - name: infrastructure
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./flux/clusters/bc-workload/observability
  prune: true
  wait: true
  # 25m: kube-prometheus-stack descarga múltiples imágenes grandes (Prometheus, Grafana, alertmanager)
  timeout: 25m

---
# ── 8.5. Observability Alerts (PrometheusRules — requieren Prometheus Operator CRDs) ──
# Separado de observability para evitar dry-run failures antes de instalar kube-prometheus-stack.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: observability-alerts
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: observability  # kube-prometheus-stack debe estar instalado (CRDs disponibles)
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./flux/clusters/bc-workload/observability/alerts
  prune: true
  wait: false
  timeout: 5m

---
# ── 9. ZTA Catalog (nginx Dark Service — catalog.bc.internal) ─────────────────
# Sirve el catálogo de servicios ZTA (catalog.yaml) como Dark Service en NetFoundry.
# Accesible ÚNICAMENTE desde la overlay NetFoundry: http://catalog.bc.internal/catalog.yaml
# El ZTA Client usa este endpoint post-enrollment para descubrir servicios disponibles.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: zta-catalog
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: namespaces     # Namespace 'catalog' debe existir
    - name: infrastructure # cert-manager y CNI activos
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/apps/catalog
  prune: true
  wait: true
  timeout: 5m
