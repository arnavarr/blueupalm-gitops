# Secreto K8s — NKey pública y credenciales del leaf node
# NOTA: En producción, estos valores se gestionan via GCP Secret Manager
# y se sincronizan con ExternalSecrets Operator (ESO)
apiVersion: v1
kind: Secret
metadata:
  name: nats-provisioning-gw-secret
  namespace: messaging
  annotations:
    # Comentar si se gestiona manualmente; descomentar para ESO
    # external-secrets.io/managed-by: external-secrets
type: Opaque
stringData:
  # Clave pública NKey del Desktop (NO es secreta, pero se gestiona aquí para parametrización)
  PROVISIONING_DESKTOP_NKEY_PUB: "PLACEHOLDER_REPLACE_WITH_GEN_OUTPUT"
  # Credenciales del leaf node hacia el cluster NATS interno
  # Generar con: nsc add creds ... (ver KI nats-mtls-hardening)
  leaf.creds: |
    PLACEHOLDER_LEAF_CREDENTIALS
