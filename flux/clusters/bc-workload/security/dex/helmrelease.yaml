# flux/clusters/bc-workload/security/dex/helmrelease.yaml
# BlueUPALM — Dex (OIDC Federation Bridge)
#
# Actúa como upstream IdP entre Keycloak y herramientas internas:
#   Grafana → Dex → Keycloak realm blueupalm
#   Hubble UI → Dex → Keycloak realm blueupalm
#   Flux UI → Dex → Keycloak realm blueupalm
#
# Permite que las herramientas de operación usen SSO sin conectarse
# directamente a Keycloak — capa de abstracción para federación IdP.

---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: dex
  namespace: security
spec:
  interval: 24h
  url: https://charts.dex.dev/

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dex
  namespace: security
spec:
  interval: 10m
  chart:
    spec:
      chart: dex
      version: "0.18.*"
      sourceRef:
        kind: HelmRepository
        name: dex
        namespace: security

  values:
    config:
      # Issuer URL de Dex (interno al cluster — accedido por los clients via OIDC discovery)
      issuer: "https://auth.navarro-bores.com/dex"

      storage:
        type: kubernetes
        config:
          inCluster: true

      web:
        http: 0.0.0.0:5556

      # ── Connector: Keycloak realm blueupalm ─────────────────────────────
      connectors:
        - type: oidc
          id: keycloak
          name: "BlueUPALM SSO (Keycloak)"
          config:
            # Keycloak realm blueupalm (acceso interno vía ClusterIP)
            issuer: "http://keycloak.security.svc.cluster.local/auth/realms/blueupalm"
            clientID: "dex-connector"
            clientSecretEnv: "KEYCLOAK_DEX_CLIENT_SECRET"
            redirectURI: "https://auth.navarro-bores.com/dex/callback"
            # Propagar grupos y entity_id de Keycloak a los claims de Dex
            scopes:
              - openid
              - email
              - profile
              - groups
            insecureSkipEmailVerified: false
            getUserInfo: true
            claimMapping:
              groups: groups
              preferred_username: preferred_username

      # ── OAuth2 Clients registrados en Dex ─────────────────────────────
      staticClients:
        - id: grafana
          name: Grafana
          secret: "grafana-dex-secret-changeme"    # En producción: ExternalSecret
          redirectURIs:
            - "https://grafana.navarro-bores.com/login/generic_oauth"

        - id: hubble-ui
          name: "Hubble UI"
          secret: "hubble-dex-secret-changeme"
          redirectURIs:
            - "https://hubble.navarro-bores.com/callback"

        - id: flux-ui
          name: "Flux UI"
          secret: "flux-dex-secret-changeme"
          redirectURIs:
            - "https://flux.navarro-bores.com/callback"

      # ── OAuth2 Config ─────────────────────────────────────────────────
      oauth2:
        skipApprovalScreen: true
        responseTypes: ["code"]

    # ── Variables de entorno para secreto del conector Keycloak ──────────
    envVars:
      - name: KEYCLOAK_DEX_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: dex-keycloak-connector-secret
            key: secret

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

    # ── ServiceMonitor Prometheus ─────────────────────────────────────────
    serviceMonitor:
      enabled: true
      namespace: observability
