# flux/clusters/bc-workload/infrastructure/namespaces.yaml
# BlueUPALM — Namespaces de Kubernetes
#
# Cada namespace refleja el aislamiento de una capa del stack.
# PodSecurity mode=restricted aplicado en namespaces de producción.
# Los namespaces de entidades bancarias (entity-<id>) se crean dinámicamente
# por el operador de multi-tenancy — aquí solo los namespaces del sistema.

---
apiVersion: v1
kind: Namespace
metadata:
  name: cilium-system
  labels:
    app.kubernetes.io/managed-by: flux
    pod-security.kubernetes.io/enforce: privileged    # Cilium necesita privilegios de red

---
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
  labels:
    app.kubernetes.io/managed-by: flux
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted

---
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
  labels:
    app.kubernetes.io/managed-by: flux
    pod-security.kubernetes.io/enforce: restricted

---
apiVersion: v1
kind: Namespace
metadata:
  name: security
  labels:
    app.kubernetes.io/managed-by: flux
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
    # Etiqueta para Cilium NetworkPolicy
    blueupalm.io/layer: security

---
apiVersion: v1
kind: Namespace
metadata:
  name: messaging
  labels:
    app.kubernetes.io/managed-by: flux
    pod-security.kubernetes.io/enforce: restricted
    blueupalm.io/layer: messaging
    # Etiqueta para aislamiento NATS en CiliumNetworkPolicy
    nats-cluster: "true"

---
apiVersion: v1
kind: Namespace
metadata:
  name: data
  labels:
    app.kubernetes.io/managed-by: flux
    pod-security.kubernetes.io/enforce: restricted
    blueupalm.io/layer: data

---
apiVersion: v1
kind: Namespace
metadata:
  name: networking
  labels:
    app.kubernetes.io/managed-by: flux
    pod-security.kubernetes.io/enforce: restricted
    blueupalm.io/layer: networking

---
apiVersion: v1
kind: Namespace
metadata:
  name: applications
  labels:
    app.kubernetes.io/managed-by: flux
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
    blueupalm.io/layer: applications

---
apiVersion: v1
kind: Namespace
metadata:
  name: observability
  labels:
    app.kubernetes.io/managed-by: flux
    pod-security.kubernetes.io/enforce: restricted
    blueupalm.io/layer: observability

---
apiVersion: v1
kind: Namespace
metadata:
  name: rook-ceph
  labels:
    app.kubernetes.io/managed-by: flux
    # Rook-Ceph requiere algunos privilegios elevados para gestionar discos
    pod-security.kubernetes.io/enforce: privileged

---
apiVersion: v1
kind: Namespace
metadata:
  name: catalog
  labels:
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/part-of: ztaclient
    # nginx:1.27-alpine corre como root por defecto — baseline en lugar de restricted
    pod-security.kubernetes.io/enforce: baseline
    blueupalm.io/layer: catalog
